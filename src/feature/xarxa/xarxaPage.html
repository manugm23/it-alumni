<!DOCTYPE html>
<html lang="ca">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Xarxa | Alumni Connect</title>
    <link rel="stylesheet" href="xarxaStyle.css" />
  </head>
  <body>

    <!-- HEADER — mobile only -->
    <header class="header">
      <button class="header__back" aria-label="Tornar enrere">←</button>
      <h1 class="header__title">Networking</h1>
      <div class="header__actions">
        <button class="header__icon" aria-label="Estadístiques">📊</button>
        <div class="header__avatar" aria-label="Perfil d'usuari"></div>
      </div>
    </header>

    <!-- NAVBAR — desktop only -->
    <nav class="navbar" aria-label="Navegació principal">
      <a href="/" class="navbar__logo">
        <span class="navbar__logo-icon">✕</span>
        Alumni Connect
      </a>
      <ul class="navbar__links">
        <li><a href="/home" class="navbar__link">Home</a></li>
        <li><a href="/xarxa" class="navbar__link navbar__link--active" aria-current="page">Networking</a></li>
        <li><a href="/feina" class="navbar__link">Job Opportunities</a></li>
      </ul>
      <div class="navbar__icons">
        <button aria-label="Cercar">🔍</button>
        <button aria-label="Notificacions">🔔</button>
        <button aria-label="Configuració">⚙️</button>
        <div class="navbar__avatar"></div>
      </div>
    </nav>

    <!-- MAIN -->
    <main class="main" id="main-content">

      <!-- SEARCH BAR + FILTERS -->
      <section class="search-section" aria-label="Cerca d'alumnes">
        <div class="search-section__bar">
          <label for="search-input" class="sr-only">Cercar alumnes</label>
          <input
            type="search"
            id="search-input"
            class="search-section__input"
            placeholder="Search alumni..."
            aria-label="Cercar alumnes per nom o competències"
          />
        </div>

        <!-- Filters — desktop only -->
        <div class="filters" role="group" aria-label="Filtres">
          <span class="filters__label">Filters:</span>
          <button class="filters__btn" data-filter="recent">Recent Activity</button>
          <button class="filters__btn filters__btn--active" data-filter="popular">Popular</button>
          <button class="filters__btn" data-filter="connected">Most Connected</button>
        </div>
      </section>

      <!-- MAIN CONTENT -->
      <div class="content">

        <!-- RECENT ACTIVITY — only desktop -->
        <aside class="activity" aria-label="Activitat recent">
          <h2 class="activity__title">Recent Activity</h2>
          <ul class="activity__list" id="activity-list">
            <!-- It is filled with TypeScript -->
          </ul>
        </aside>

        <!-- ALUMNI GRID -->
        <section class="alumni" aria-label="Llista d'alumnes">
          <ul class="alumni__grid" id="alumni-grid" role="list">
            <!-- It is filled with TypeScript -->
          </ul>
        </section>

      </div>
    </main>

    <!-- LOWER NAV — only mobile -->
    <nav class="bottom-nav" aria-label="Navegació inferior">
      <a href="/home" class="bottom-nav__item" aria-label="Inici">
        <span class="bottom-nav__icon">🏠</span>
        <span class="bottom-nav__label">Home</span>
      </a>
      <a href="/xarxa" class="bottom-nav__item bottom-nav__item--active" aria-current="page" aria-label="Networking">
        <span class="bottom-nav__icon">👥</span>
        <span class="bottom-nav__label">Networking</span>
      </a>
      <a href="/feina" class="bottom-nav__item" aria-label="Portal de feina">
        <span class="bottom-nav__icon">💼</span>
        <span class="bottom-nav__label">Job Portal</span>
      </a>
      <a href="/perfil" class="bottom-nav__item" aria-label="Perfil">
        <span class="bottom-nav__icon">👤</span>
        <span class="bottom-nav__label">Profile</span>
      </a>
    </nav>

    <!-- FOOTER -->
    <footer class="footer">
      <div class="footer__newsletter">
        <p class="footer__newsletter-text">"No et perdis res, subscriu-te!"</p>
        <div class="footer__newsletter-form">
          <label for="newsletter-email" class="sr-only">El teu email</label>
          <input
            type="email"
            id="newsletter-email"
            class="footer__newsletter-input"
            placeholder="El teu email"
          />
          <button class="footer__newsletter-btn">Subscriu-te</button>
        </div>
      </div>
      <div class="footer__bottom">
        <p class="footer__copy">© 2024 Brand, Inc. • Privadesa • Termes d'ús • Mapa del lloc</p>
      </div>
    </footer>

    <script type="module" src="./xarxaManager.ts"></script>
  </body>
</html>
